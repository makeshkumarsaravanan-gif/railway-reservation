<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - SmartRail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background: linear-gradient(135deg, #4338ca 0%, #10b981 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
        }
        .login-card { 
            border-radius: 24px; 
            border: none; 
            overflow: hidden;
        }
        .input-group-text {
            background: transparent;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .btn-primary {
            background-color: #4338ca;
            border: none;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #3730a3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-7 col-lg-5 col-xl-4">
            
            <div class="card login-card shadow-lg p-3 p-md-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="display-6 text-primary mb-2">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1">User Login</h3>
                        <p class="text-muted small">Access your SmartRail account</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control shadow-none" placeholder="example@mail.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control shadow-none" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button id="loginBtn" class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow" onclick="login()">
                        Login
                    </button>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">Don't have an account? 
                            <a href="register.html" class="text-primary text-decoration-none fw-bold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>

            <p class="text-center text-white-50 mt-4 small">
                &copy; 2026 SmartRail Booking System
            </p>

        </div>
    </div>
</div>

<script>
// ✅ Render Deployment-kaga dynamic API URL
const API_BASE_URL = window.location.hostname === "localhost" 
    ? "http://localhost:5000" 
    : window.location.origin; 

async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const loginBtn = document.getElementById("loginBtn");

    if (!email || !password) {
        alert("Email matrum Password-ah type pannunga!");
        return;
    }

    loginBtn.innerText = "Connecting...";
    loginBtn.disabled = true;

    try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
            // ✅ Storing session data
            localStorage.setItem("token", data.token);
            
            if (data.user) {
                localStorage.setItem("user_id", data.user.id);
                localStorage.setItem("user_name", data.user.name);
                localStorage.setItem("user_email", data.user.email);
            }

            alert("✅ Login Successful!");
            window.location.href = "dashboard.html"; 
        } else {
            alert("❌ " + (data.message || "Email illai Password thappu!"));
        }
    } catch (err) {
        console.error("Login Error:", err);
        alert("❌ Server Connection Fail! Server run aagudhannu check pannunga.");
    } finally {
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}

// ✅ Keyboard "Enter" key support for login
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        login();
    }
});

window.onload = () => {
    if(localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
