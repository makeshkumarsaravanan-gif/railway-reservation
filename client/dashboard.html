<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SmartRail</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
        }

        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b;
        }

        .header-bg {
            background: var(--primary-gradient);
            padding: 60px 0 100px 0;
            color: white;
        }

        .search-container { 
            margin-top: -60px;
        }

        .train-card-hover:hover { 
            background-color: #f8faff !important; 
        }

        .time-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom shadow-sm py-3">
    <div class="container">
        <span class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center" style="cursor:pointer" onclick="location.href='dashboard.html'">
            <i class="bi bi-train-front-fill me-2"></i>SmartRail
        </span>
        
        <div class="dropdown">
            <button class="btn btn-link p-0 border-0" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-2 text-primary"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3 p-2" style="border-radius: 16px; min-width: 200px;">
                <li class="px-3 py-2 border-bottom mb-2 text-center">
                    <p class="mb-0 fw-bold text-dark small" id="displayName">User</p>
                    <small class="text-muted d-block" style="font-size: 0.7rem;" id="displayEmail">user@railway.com</small>
                </li>
                <li><a class="dropdown-item rounded-3 py-2" href="profile.html"><i class="bi bi-person-gear me-2"></i> My Profile</a></li>
                <li><a class="dropdown-item rounded-3 py-2" href="my-bookings.html"><i class="bi bi-journal-check me-2"></i> My Bookings</a></li>
                <li><hr class="dropdown-divider mx-2"></li>
                <li><button class="dropdown-item text-danger rounded-3 py-2" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</button></li>
            </ul>
        </div>
    </div>
</nav>

<div class="header-bg text-center">
    <div class="container">
        <h1 class="fw-bold display-6">Find Your Next Journey</h1>
        <p class="opacity-75 lead">Search, Book, and Travel with ease.</p>
    </div>
</div>

<div class="container search-container">
    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label small fw-bold text-uppercase text-muted">From Station</label>
                <select id="source" class="form-select border-light bg-light py-3 rounded-3 shadow-none">
                    <option value="">Select Source</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-uppercase text-muted">To Station</label>
                <select id="destination" class="form-select border-light bg-light py-3 rounded-3 shadow-none">
                    <option value="">Select Destination</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-uppercase text-muted">Time Slot</label>
                <select id="time" class="form-select border-light bg-light py-3 rounded-3 shadow-none">
                    <option value="">Any Time</option>
                    <option value="morning">Morning (5am - 12pm)</option>
                    <option value="afternoon">Afternoon (12pm - 5pm)</option>
                    <option value="night">Night (5pm - 5am)</option>
                </select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100 fw-bold py-3 rounded-3 shadow" onclick="searchTrain()">
                    <i class="bi bi-search me-2"></i>SEARCH TRAINS
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mt-4 mb-5 overflow-hidden">
        <div class="card-header bg-white border-0 p-4 d-flex flex-wrap justify-content-between align-items-center gap-2">
            <h5 class="fw-bold m-0 text-dark">Live Train Schedule</h5>
            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill border border-primary border-opacity-25" id="resultCount">0 Results Found</span>
        </div>
        
        <div class="table-responsive px-4 pb-4">
            <table class="table align-middle table-hover mb-0">
                <thead class="bg-light">
                    <tr class="text-uppercase small fw-bold text-muted">
                        <th class="py-3 border-0">Train Details</th>
                        <th class="py-3 border-0">Route</th>
                        <th class="py-3 border-0">Departure</th>
                        <th class="py-3 border-0">Arrival</th>
                        <th class="py-3 border-0">Availability</th>
                        <th class="py-3 border-0">Price</th>
                        <th class="py-3 border-0">Action</th>
                    </tr>
                </thead>
                <tbody id="trainTable" class="border-top-0">
                    <tr><td colspan='7' class="text-center py-5 text-muted small">Please select source and destination.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ✅ Render Deployment dynamic API URL
const API_BASE = window.location.hostname === "localhost" 
    ? "http://localhost:5000" 
    : window.location.origin; 

const token = localStorage.getItem("token");

if(!token) { window.location.href="login.html"; }

document.getElementById("displayName").innerText = localStorage.getItem("user_name") || "Railway User";
document.getElementById("displayEmail").innerText = localStorage.getItem("user_email") || "user@railway.com";

async function loadStations() {
    try {
        const res = await fetch(`${API_BASE}/api/trains`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const trainList = data.data || [];

        const sourceSelect = document.getElementById("source");
        const destSelect = document.getElementById("destination");

        sourceSelect.innerHTML = '<option value="">Select Source</option>';
        destSelect.innerHTML = '<option value="">Select Destination</option>';

        const sources = [...new Set(trainList.map(t => t.source))].sort();
        const destinations = [...new Set(trainList.map(t => t.destination))].sort();

        sources.forEach(s => { if(s) sourceSelect.innerHTML += `<option value="${s}">${s}</option>`; });
        destinations.forEach(d => { if(d) destSelect.innerHTML += `<option value="${d}">${d}</option>`; });
        
    } catch(err) { console.error("Error loading stations:", err); }
}

window.onload = loadStations;

async function searchTrain() {
    const src = document.getElementById("source").value;
    const dst = document.getElementById("destination").value;
    const timeSlot = document.getElementById("time").value;

    if(!src || !dst) { alert("Please select both Source and Destination!"); return; }

    const table = document.getElementById("trainTable");
    table.innerHTML = `<tr><td colspan='7' class='text-center py-5'><div class='spinner-border text-primary' role='status'></div><p class='mt-2 small text-muted'>Searching trains...</p></td></tr>`;

    try {
        const queryParams = new URLSearchParams({ source: src, destination: dst, time: timeSlot }).toString();
        const res = await fetch(`${API_BASE}/api/trains/search?${queryParams}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await res.json();
        const list = data.data || [];
        document.getElementById("resultCount").innerText = `${list.length} Trains Found`;

        if(list.length === 0) {
            table.innerHTML = "<tr><td colspan='7' class='text-center py-5 text-danger'><i class='bi bi-search fs-3'></i><p class='mt-2'>No trains found.</p></td></tr>";
            return;
        }

        table.innerHTML = list.map(t => `
            <tr class="train-card-hover border-bottom">
                <td class="py-4">
                    <div class="fw-bold text-primary">${t.train_name}</div>
                    <small class="text-muted">#ID-${t.id}</small>
                </td>
                <td>
                    <div class="small fw-semibold text-dark">${t.source}</div>
                    <div class="text-muted small">to ${t.destination}</div>
                </td>
                <td>
                    <span class="time-badge bg-primary bg-opacity-10 text-primary">
                        <i class="bi bi-box-arrow-up-right me-1"></i>${t.departure_time}
                    </span>
                </td>
                <td>
                    <span class="time-badge bg-danger bg-opacity-10 text-danger">
                        <i class="bi bi-box-arrow-in-down-left me-1"></i>${t.arrival_time}
                    </span>
                </td>
                <td>
                    <span class="badge bg-success bg-opacity-10 text-success fw-bold p-2 px-3 rounded-3" style="font-size: 0.75rem;">
                        ${t.total_seats} Seats Left
                    </span>
                </td>
                <td><span class="fw-bold text-dark fs-5">₹${t.price}</span></td>
                <td>
                    <button class="btn btn-primary btn-sm px-4 fw-bold rounded-3 shadow-sm" onclick="selectTrain(${t.id})">
                        Book Now
                    </button>
                </td>
            </tr>
        `).join("");
    } catch(err) { 
        table.innerHTML = "<tr><td colspan='7' class='text-center py-5 text-danger'>⚠️ Connection Error!</td></tr>"; 
    }
}

function selectTrain(id) {
    localStorage.setItem("selected_train", id);
    window.location.href = "booking.html";
}

function logout() {
    if(confirm("Are you sure you want to logout?")) {
        localStorage.clear();
        window.location.href = "index.html"; 
    }
}
</script>
</body>
</html>
