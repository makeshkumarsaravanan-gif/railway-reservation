<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Reservation - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Background fix - Logic disturb pannaama background mattum optimize pannirukan */
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Pure Bootstrap logic-kulla varaadha chinna alignment mattum inga irukum */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark fixed-top bg-primary bg-opacity-75 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold ls-1" href="index.html">
            <i class="bi bi-train-front-fill me-2"></i>SMARTRAIL
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-9 col-md-7 col-lg-5">
            <div class="card glass-card border-0 shadow-lg rounded-5 p-4 p-md-5 text-center">
                
                <div class="mb-4">
                    <div class="display-5 text-primary mb-3">
                        <i class="bi bi-ticket-detailed"></i>
                    </div>
                    <h2 class="fw-black text-dark mb-2">Next Journey Starts Here</h2>
                    <p class="text-muted small">The smartest way to book your train tickets online.</p>
                </div>

                <hr class="my-4 opacity-25">

                <div id="authButtons" class="row g-3">
                    <div class="col-6">
                        <a href="login.html" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow-sm">
                            Login
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="register.html" class="btn btn-outline-dark btn-lg w-100 rounded-pill fw-bold py-3 shadow-sm">
                            Join Now
                        </a>
                    </div>
                </div>

                <div id="userGreeting" class="d-none">
                    <div class="p-3 bg-primary bg-opacity-10 rounded-4 mb-4">
                        <h4 class="mb-1 text-primary fw-bold">Vanakkam, <span id="welcomeName">Traveler</span>!</h4>
                        <p class="text-muted small mb-0">Good to see you back today.</p>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="dashboard.html" class="btn btn-success btn-lg rounded-pill fw-bold py-3 shadow-sm">
                            <i class="bi bi-speedometer2 me-2"></i>Go to Dashboard
                        </a>
                        <button onclick="logout()" class="btn btn-link text-danger text-decoration-none fw-bold mt-2">
                            <i class="bi bi-box-arrow-right me-1"></i> Logout
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const token = localStorage.getItem("token");
        const userName = localStorage.getItem("user_name");

        if (token && token !== "undefined" && token !== null) {
            document.getElementById("authButtons").classList.add("d-none");
            document.getElementById("userGreeting").classList.remove("d-none");
            if(userName) {
                document.getElementById("welcomeName").innerText = userName;
            }
        }
    };

    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.clear();
            window.location.reload(); 
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
