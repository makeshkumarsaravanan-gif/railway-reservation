<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartRail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #4338ca 0%, #10b981 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            border-radius: 24px;
            overflow: hidden;
            border: none;
        }
        .input-group-text {
            background: transparent;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            
            <div class="card register-card shadow-lg p-3 p-md-4">
                <div class="card-body">
                    <a href="index.html" class="text-decoration-none text-muted small mb-4 d-inline-block">
                        <i class="bi bi-arrow-left me-1"></i> Back to Home
                    </a>

                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark mb-1">Create Account</h3>
                        <p class="text-muted small">Join SmartRail for easy travel</p>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" id="name" class="form-control shadow-none" placeholder="Enter your name" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" class="form-control shadow-none" placeholder="name@example.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" class="form-control shadow-none" placeholder="Min 6 characters" required>
                            </div>
                        </div>

                        <button type="button" id="regBtn" class="btn btn-success w-100 py-3 rounded-3 fw-bold shadow-sm" onclick="register()">
                            Register Now
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">Already have an account? 
                            <a href="login.html" class="text-primary text-decoration-none fw-bold">Login here</a>
                        </p>
                    </div>
                </div>
            </div>

            <p class="text-center text-white-50 mt-4 small">
                &copy; 2026 SmartRail Booking System
            </p>

        </div>
    </div>
</div>

<script>
// ✅ Render Deployment-kaga dynamic API URL
const API_BASE = window.location.hostname === "localhost" 
    ? "http://localhost:5000" 
    : window.location.origin; 

window.onload = () => {
    if(localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
    }
};

async function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const regBtn = document.getElementById("regBtn");

    if (!name || !email || !password) {
        alert("⚠️ Ella details-um fill pannunga.");
        return;
    }

    if (password.length < 6) {
        alert("⚠️ Password min 6 characters irukanum.");
        return;
    }

    regBtn.innerText = "Processing...";
    regBtn.disabled = true;

    try {
        const response = await fetch(`${API_BASE}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok || data.success) {
            alert("✅ Registration Success! Ippo login pannunga.");
            window.location.href = "login.html";
        } else {
            alert("❌ Registration Failed: " + (data.message || "Indha email munnadiyae register aagi irukkalaam."));
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        alert("❌ Server Connection Fail! Terminal-la server run aagudha-nu check pannunga.");
    } finally {
        regBtn.innerText = "Register Now";
        regBtn.disabled = false;
    }
}

// ✅ Keyboard "Enter" key support for registration
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        register();
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
