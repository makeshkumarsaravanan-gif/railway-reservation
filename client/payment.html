<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Summary - SmartRail</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .payment-card { border-radius: 24px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .passenger-item { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
        }
        .ticket-receipt {
            background: #f8faff;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 25px;
            position: relative;
        }
        .btn-pay-opt {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn-pay-opt:hover {
            border-color: #4338ca;
            background: #f5f3ff;
            transform: translateY(-3px);
        }
        .success-glow {
            font-size: 70px;
            color: #22c55e;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom py-3">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary" onclick="location.href='dashboard.html'" style="cursor:pointer">
            <i class="bi bi-shield-check-fill me-2"></i>SmartRail Secure Pay
        </span>
        <button class="btn btn-light rounded-pill px-3" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card payment-card overflow-hidden" id="mainCard">
                <div class="card-header bg-primary p-4 text-center text-white border-0" id="headerTitleBox">
                    <h5 class="fw-bold mb-0" id="headerTitle">Booking Summary</h5>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div id="bookingSummary">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                        </div>
                    </div>

                    <div id="paymentSection" class="mt-5">
                        <h6 class="text-center fw-bold text-muted small text-uppercase mb-4">Choose Payment Mode</h6>
                        <div class="row g-3 text-center">
                            <div class="col-4">
                                <button class="btn btn-pay-opt w-100" onclick="processPayment('UPI')">
                                    <i class="bi bi-phone fs-3 text-primary mb-1"></i>
                                    <span class="fw-bold small">UPI</span>
                                </button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-pay-opt w-100" onclick="processPayment('Card')">
                                    <i class="bi bi-credit-card fs-3 text-primary mb-1"></i>
                                    <span class="fw-bold small">CARD</span>
                                </button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-pay-opt w-100" onclick="processPayment('Net Banking')">
                                    <i class="bi bi-bank fs-3 text-primary mb-1"></i>
                                    <span class="fw-bold small">BANK</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ✅ Render Deployment dynamic API URL
const API_BASE = window.location.hostname === "localhost" 
    ? "http://localhost:5000" 
    : window.location.origin; 

const token = localStorage.getItem("token");
const bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!token || !bookingData) { window.location.href = "login.html"; }

async function loadSummary() {
    try {
        const res = await fetch(`${API_BASE}/api/trains/${bookingData.train_id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        const t = result.data || result;

        const summaryDiv = document.getElementById("bookingSummary");
        let passengerListHtml = '';
        bookingData.passengers.forEach((p, index) => {
            passengerListHtml += `
                <div class="passenger-item d-flex justify-content-between align-items-center">
                    <div>
                        <span class="fw-bold text-dark">${p.name}</span>
                        <div class="small text-muted">${p.gender || ''} | Age: ${p.age}</div>
                    </div>
                    <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill">
                        Seat: ${p.seat_number}
                    </span>
                </div>
            `;
        });

        summaryDiv.innerHTML = `
            <div class="bg-light rounded-4 p-4 mb-4 border border-primary border-opacity-10">
                <div class="row align-items-center">
                    <div class="col-7">
                        <h4 class="fw-black text-primary mb-1">🚂 ${t.train_name}</h4>
                        <p class="text-muted small mb-0">${t.source} ➔ ${t.destination}</p>
                    </div>
                    <div class="col-5 text-end">
                        <div class="small text-muted fw-bold">TRAIN NO.</div>
                        <div class="fw-bold fs-5">#${t.id}</div>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase mb-3 d-block">Passenger Details</label>
                ${passengerListHtml}
            </div>
            <div class="card bg-dark text-white p-4 rounded-4 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="opacity-75">Final Fare</span>
                    <span class="h2 fw-black text-warning mb-0">₹${bookingData.total_price}</span>
                </div>
            </div>
        `;
    } catch (err) {
        console.error("Summary load error:", err);
    }
}

async function processPayment(method) {
    const paySection = document.getElementById("paymentSection");
    paySection.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary mb-3"></div><h5 class="fw-bold">Securing your seat...</h5></div>`;

    try {
        const response = await fetch(`${API_BASE}/api/bookings/book`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Authorization": `Bearer ${token}` 
            },
            body: JSON.stringify({ ...bookingData, paymentMethod: method })
        });

        const result = await response.json();

        if (response.ok || result.success) {
            document.getElementById("headerTitle").innerText = "Booking Confirmed";
            document.getElementById("headerTitleBox").classList.replace("bg-primary", "bg-success");
            
            // Ticket confirmed view with download link using API_BASE
            document.getElementById("mainCard").innerHTML = `
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="success-glow mb-3"><i class="bi bi-patch-check-fill"></i></div>
                    <h2 class="fw-black mb-1">Ticket Reserved!</h2>
                    <p class="text-muted mb-4">Your journey is ready. Your ticket is available below.</p>
                    <div class="ticket-receipt mb-4 py-5">
                        <div class="small fw-bold text-muted text-uppercase">PNR NUMBER</div>
                        <h1 class="display-3 fw-black text-primary mb-0" style="letter-spacing:4px">${result.pnr}</h1>
                    </div>
                    <div class="row g-3">
                        <div class="col-sm-6 text-center">
                            <a href="${API_BASE}/api/bookings/ticket/${result.pnr}" target="_blank" class="btn btn-success btn-lg w-100 rounded-pill fw-bold">
                                <i class="bi bi-download me-2"></i>Download Ticket
                            </a>
                        </div>
                        <div class="col-sm-6 text-center">
                            <a href="my-bookings.html" class="btn btn-outline-dark btn-lg w-100 rounded-pill fw-bold">
                                My Bookings
                            </a>
                        </div>
                    </div>
                </div>`;
            
            localStorage.removeItem("bookingData");
        } else {
            alert("❌ Booking Failed: " + (result.message || "Unknown Error"));
            location.reload();
        }
    } catch (err) { 
        alert("❌ Payment Server Error! Terminal logs check pannunga."); 
        location.reload();
    }
}

loadSummary();
function logout() { localStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
